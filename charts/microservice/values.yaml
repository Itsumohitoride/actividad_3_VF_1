# Default values for microservice chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  environment: development

# -- Number of replicas
replicaCount: 1

# -- Image configuration
image:
  repository: ghcr.io/YOUR_USERNAME/actividad-3-vf-1-microservice
  tag: latest
  pullPolicy: IfNotPresent

# -- Resource requests and limits
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 1Gi

# -- Liveness probe configuration
livenessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30

# -- Readiness probe configuration
readinessProbe:
  httpGet:
    path: /actuator/health
    port: http
  initialDelaySeconds: 15
  periodSeconds: 10

# -- Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# -- Ingress configuration
ingress:
  enabled: false
  host: microservice.local
  tls: false
  tlsSecret: ""

# -- Application configuration (injected via ConfigMap)
config:
  springProfilesActive: dev
  healthShowDetails: always

# -- Autoscaling / HPA configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80
