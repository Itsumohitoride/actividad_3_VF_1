# Default values for microservice chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Deployment environment (development, staging, production)
environment: development

# -- Number of replicas
replicaCount: 1

# -- Image configuration
image:
  repository: ghcr.io/itsumohitoride/actividad-3-vf-1-microservice
  tag: latest
  pullPolicy: IfNotPresent

# -- Resource requests and limits
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1
    memory: 1Gi

# -- Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# -- Ingress configuration
ingress:
  enabled: false
  host: microservice.local

# -- Application configuration (injected via ConfigMap)
config:
  springProfilesActive: dev
  healthShowDetails: always
