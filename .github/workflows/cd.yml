name: CD

on:
  push:
    branches: [develop]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/actividad-3-vf-1-microservice
  HELM_VALUES: charts/microservice/values-dev.yaml

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Helm values with new image tag
        run: |
          $tag = "${{ steps.meta.outputs.tags }}" -split ',' | Select-Object -First 1
          $shaTag = "${{ github.sha }}".Substring(0, 7)
          (Get-Content $env:HELM_VALUES) -replace 'tag: .+', "tag: $shaTag" | Set-Content $env:HELM_VALUES
        shell: pwsh
        env:
          HELM_VALUES: ${{ env.HELM_VALUES }}

      - name: Commit updated Helm values
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add $env:HELM_VALUES
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 1) {
            git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
            git push
            Write-Host "Helm values updated and pushed"
          } else {
            Write-Host "No changes to commit"
          }
        shell: pwsh
        env:
          HELM_VALUES: ${{ env.HELM_VALUES }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
